services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: trendit
      POSTGRES_USER: trendit
      POSTGRES_PASSWORD: trendit
    ports:
      - "5432:5432"
    volumes:
      - trendit_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trendit"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./api/.env.local
    environment:
      - DATABASE_URL=postgresql+asyncpg://trendit:trendit@db:5432/trendit
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        API_URL: http://api:8000
    ports:
      - "3000:3000"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  trendit_pgdata:
